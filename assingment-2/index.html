<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment 2</title>

    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="assignment2.css" />

    <script src="https://unpkg.com/tone@15.0.4/build/Tone.js"></script>

    <script src="assignment2.js" defer></script>
  </head>
  <body>
    <section class="playArea">
      <div id="square-container">
        <!-- using Claude Ai I wanted to figure out how should I best create this 
         system since I had to link it up to the JS. I could have had different ID 
         for each square but using this data I can seperate it based on row and column 
         for more control over what I might what to do with it-->

        <!-- Using chatgpt to help me write it all since it will be faster -->
        <div id="grid-container">
          <!-- Row 0 -->
          <div class="square" data-row="0" data-col="0"></div>
          <div class="square" data-row="0" data-col="1"></div>
          <div class="square" data-row="0" data-col="2"></div>
          <div class="square" data-row="0" data-col="3"></div>
          <div class="square" data-row="0" data-col="4"></div>
          <div class="square" data-row="0" data-col="5"></div>
          <div class="square" data-row="0" data-col="6"></div>
          <div class="square" data-row="0" data-col="7"></div>
          <div class="square" data-row="0" data-col="8"></div>
          <div class="square" data-row="0" data-col="9"></div>

          <!-- Row 1 -->
          <div class="square" data-row="1" data-col="0"></div>
          <div class="square" data-row="1" data-col="1"></div>
          <div class="square" data-row="1" data-col="2"></div>
          <div class="square" data-row="1" data-col="3"></div>
          <div class="square" data-row="1" data-col="4"></div>
          <div class="square" data-row="1" data-col="5"></div>
          <div class="square" data-row="1" data-col="6"></div>
          <div class="square" data-row="1" data-col="7"></div>
          <div class="square" data-row="1" data-col="8"></div>
          <div class="square" data-row="1" data-col="9"></div>

          <!-- Row 2 -->
          <div class="square" data-row="2" data-col="0"></div>
          <div class="square" data-row="2" data-col="1"></div>
          <div class="square" data-row="2" data-col="2"></div>
          <div class="square" data-row="2" data-col="3"></div>
          <div class="square" data-row="2" data-col="4"></div>
          <div class="square" data-row="2" data-col="5"></div>
          <div class="square" data-row="2" data-col="6"></div>
          <div class="square" data-row="2" data-col="7"></div>
          <div class="square" data-row="2" data-col="8"></div>
          <div class="square" data-row="2" data-col="9"></div>

          <!-- Row 3 -->
          <div class="square" data-row="3" data-col="0"></div>
          <div class="square" data-row="3" data-col="1"></div>
          <div class="square" data-row="3" data-col="2"></div>
          <div class="square" data-row="3" data-col="3"></div>
          <div class="square" data-row="3" data-col="4"></div>
          <div class="square" data-row="3" data-col="5"></div>
          <div class="square" data-row="3" data-col="6"></div>
          <div class="square" data-row="3" data-col="7"></div>
          <div class="square" data-row="3" data-col="8"></div>
          <div class="square" data-row="3" data-col="9"></div>

          <!-- Row 4 -->
          <div class="square" data-row="4" data-col="0"></div>
          <div class="square" data-row="4" data-col="1"></div>
          <div class="square" data-row="4" data-col="2"></div>
          <div class="square" data-row="4" data-col="3"></div>
          <div class="square" data-row="4" data-col="4"></div>
          <div class="square" data-row="4" data-col="5"></div>
          <div class="square" data-row="4" data-col="6"></div>
          <div class="square" data-row="4" data-col="7"></div>
          <div class="square" data-row="4" data-col="8"></div>
          <div class="square" data-row="4" data-col="9"></div>

          <!-- Row 5 -->
          <div class="square" data-row="5" data-col="0"></div>
          <div class="square" data-row="5" data-col="1"></div>
          <div class="square" data-row="5" data-col="2"></div>
          <div class="square" data-row="5" data-col="3"></div>
          <div class="square" data-row="5" data-col="4"></div>
          <div class="square" data-row="5" data-col="5"></div>
          <div class="square" data-row="5" data-col="6"></div>
          <div class="square" data-row="5" data-col="7"></div>
          <div class="square" data-row="5" data-col="8"></div>
          <div class="square" data-row="5" data-col="9"></div>
        </div>
      </div>
    </section>

    <section class="shape-container">
      <section>
        <div
          class="shape"
          id="rectangle"
          draggable="true"
          data-width="2"
          data-height="1"
          ondragstart="dragstartHandler(event)"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="210"
            height="100"
            viewBox="0 0 357 170"
            fill="none"
          >
            <path
              d="M33.974 169.943H322.594C341.286 169.943 356.573 154.651 356.573 135.964V33.9792C356.573 15.2917 341.286 0 322.594 0H33.974C15.2865 0 0 15.2917 0 33.9792V135.964C0 154.651 15.2865 169.943 33.974 169.943Z"
            />
          </svg>
        </div>

        <div
          class="shape"
          id="circle"
          draggable="true"
          data-width="1"
          data-height="1"
          ondragstart="dragstartHandler(event)"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="100"
            height="100"
            viewBox="0 0 170 170"
            fill="none"
          >
            <path
              d="M84.974 169.938C38.2396 169.938 0 131.703 0 84.9688C0 38.2344 38.2396 0 84.974 0C131.708 0 169.943 38.2344 169.943 84.9688C169.943 131.703 131.708 169.938 84.974 169.938Z"
            />
          </svg>
        </div>

        <div
          class="shape"
          id="triangle"
          draggable="true"
          data-width="1"
          data-height="1"
          ondragstart="dragstartHandler(event)"
        >
          <!-- I learnt to use the plugin from figma, helping me create the element and easily change the colour -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="100"
            height="100"
            viewBox="0 0 155 169"
            fill="none"
          >
            <path
              d="M63.9263 8.54688L1.28046 148.422C-3.006 157.984 3.994 168.792 14.4784 168.792H139.77C150.254 168.792 157.254 157.984 152.968 148.422L90.3221 8.54688C85.218 -2.84896 69.0305 -2.84896 63.9263 8.54688Z"
            />
          </svg>
        </div>
      </section>

      <div
        class="shape"
        id="bridge"
        draggable="true"
        data-width="3"
        data-height="2"
        ondragstart="dragstartHandler(event)"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="320"
          height="210"
          viewBox="0 0 550 354"
          fill="none"
        >
          <path
            d="M513.646 0H35.4479C15.9531 0 0 14.8281 0 32.9531V320.74C0 338.859 15.9531 353.688 35.4479 353.688H75.0052C97.3021 353.688 115.38 336.885 115.38 316.156V265.802C115.38 184.026 186.016 116.521 273.984 116.24C362.146 115.953 433.708 182.307 433.708 264.198V316.156C433.708 336.885 451.786 353.688 474.089 353.688H513.646C533.141 353.688 549.089 338.859 549.089 320.74V32.9531C549.089 14.8281 533.141 0 513.646 0Z"
          />
        </svg>
      </div>
    </section>
  </body>
</html>
